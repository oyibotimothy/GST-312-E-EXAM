        { q: "Traditional institutions contribute to peacebuilding mainly through:", options: ["Mediation, conflict prevention, and reconciliation ceremonies", "Issuing international economic sanctions", "Commanding national armed forces", "Setting national tax policy"], answer: 0 },
        { q: "A major challenge of post-conflict reconstruction, per the notes, includes:", options: ["Abundant and guaranteed funding", "Complete political stability", "Funding shortages and weak institutions", "A total absence of psychological trauma"], answer: 2 },
        { q: "Which of the following best summarises the role of the media in peacebuilding, according to the notes?", options: ["The media can only escalate conflict, never promote peace", "The media can either escalate conflict through irresponsible reporting or promote peace through responsible journalism", "The media has no role in conflict management", "The media's only role is entertainment"], answer: 1 }
    ];

    let preparedQuestions = [];
    let userAnswers = {};
    let currentIndex = 0;

    // Helper: Fisher-Yates Shuffle
    function shuffleArray(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Initialize Quiz with randomized questions and randomized options
    function initQuiz() {
        let shuffledQ = shuffleArray(rawQuestions);

        preparedQuestions = shuffledQ.map(item => {
            const correctAnswerText = item.options[item.answer];
            const shuffledOptions = shuffleArray(item.options);
            const newCorrectIndex = shuffledOptions.indexOf(correctAnswerText);

            return {
                q: item.q,
                options: shuffledOptions,
                answer: newCorrectIndex
            };
        });

        userAnswers = {};
        currentIndex = 0;

        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('questionBox').style.display = 'block';
        document.getElementById('progressSection').style.display = 'block';
        document.getElementById('footerNav').style.display = 'flex';

        renderQuestion();
    }

    function renderQuestion() {
        const currentQ = preparedQuestions[currentIndex];
        
        document.getElementById('questionText').innerHTML = `${currentIndex + 1}. ${currentQ.q}`;

        const optionsList = document.getElementById('optionsList');
        optionsList.innerHTML = '';

        const optionPrefixes = ['a', 'b', 'c', 'd'];

        currentQ.options.forEach((optText, optIdx) => {
            const li = document.createElement('li');
            li.className = 'option-item';

            const isChecked = userAnswers[currentIndex] === optIdx;

            li.innerHTML = `
                <label class="option-label ${isChecked ? 'selected' : ''}" id="label-opt-${optIdx}">
                    <input type="radio" name="option" value="${optIdx}" ${isChecked ? 'checked' : ''} onchange="selectOption(${optIdx})">
                    <span><strong>${optionPrefixes[optIdx]})</strong> ${optText}</span>
                </label>
            `;
            optionsList.appendChild(li);
        });

        updateProgress();
    }

    function selectOption(index) {
        userAnswers[currentIndex] = index;
        
        // Update styling visually without full re-render loop
        const labels = document.querySelectorAll('.option-label');
        labels.forEach((label, idx) => {
            if (idx === index) {
                label.classList.add('selected');
            } else {
                label.classList.remove('selected');
            }
        });

        updateProgress();
    }

    function navigate(direction) {
        currentIndex += direction;
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= preparedQuestions.length) currentIndex = preparedQuestions.length - 1;
        renderQuestion();
    }

    function updateProgress() {
        const total = preparedQuestions.length;
        const answeredCount = Object.keys(userAnswers).length;

        document.getElementById('questionProgressText').innerText = `Question ${currentIndex + 1} of ${total}`;
        document.getElementById('answeredCountText').innerText = `Answered: ${answeredCount}/${total}`;

        const fillPercentage = ((currentIndex + 1) / total) * 100;
        document.getElementById('progressBarFill').style.width = `${fillPercentage}%`;

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === total - 1;
    }

    function confirmSubmit() {
        const answeredCount = Object.keys(userAnswers).length;
        const total = preparedQuestions.length;

        let message = `Are you sure you want to submit? You have answered ${answeredCount} out of ${total} questions.`;
        if (answeredCount < total) {
            message += `\n\nWarning: You have ${total - answeredCount} unanswered question(s).`;
        }

        if (confirm(message)) {
            calculateAndShowResult();
        }
    }

    function calculateAndShowResult() {
        let score = 0;
        preparedQuestions.forEach((q, idx) => {
            if (userAnswers[idx] === q.answer) {
                score++;
            }
        });

        const total = preparedQuestions.length;
        const percentage = Math.round((score / total) * 100);

        document.getElementById('questionBox').style.display = 'none';
        document.getElementById('progressSection').style.display = 'none';
        document.getElementById('footerNav').style.display = 'none';

        document.getElementById('scoreDisplay').innerText = `${score} / ${total}`;
        document.getElementById('percentageDisplay').innerText = `Overall Score: ${percentage}%`;
        document.getElementById('resultScreen').style.display = 'block';
    }

    function restartQuiz() {
        initQuiz();
    }

    window.onload = initQuiz;
</script>
</body>
</html>
